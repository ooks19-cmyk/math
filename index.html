                                                            src={car.image}

                                                                setSelectedImageUrl(car.image);
                                                                setSelectedImageName(car.name);
                                                                setShowImageModal(true);
                                                            }}
                                                            title="사진 크게 보기"
                                                        />
                                                        <span className="absolute bottom-1 right-1 text-[8px] bg-slate-950/80 text-indigo-300 px-1.5 py-0.5 rounded border border-indigo-500/20">🔍 확대</span>

                                                    <p className="text-[9px] text-slate-400 mb-3 text-center line-clamp-2 h-6">{car.desc}</p>

                                                            <span className="text-red-400">⚡ 최고속도</span>
                                                            <span className="text-white">{car.baseSpeed} km/h</span>
                                                        </div>
                                                        <div className="w-full bg-slate-800 h-1 rounded-full overflow-hidden">
                                                            <div className="bg-red-500 h-full" style={{ width: `${(car.baseSpeed / 400) * 100}%` }}></div>
                                                        </div>
                                                        <div className="flex justify-between font-bold text-[9px] mt-1">
                                                            <span className="text-yellow-400">🔥 가속도</span>
                                                            <span className="text-white">{car.baseAccel}</span>
                                                        </div>
                                                        <div className="w-full bg-slate-800 h-1 rounded-full overflow-hidden">
                                                            <div className="bg-yellow-400 h-full" style={{ width: `${(car.baseAccel / 15) * 100}%` }}></div>
                                                        </div>
                                                        <div className="flex justify-between font-bold text-[9px] mt-1">
                                                            <span className="text-green-400">🎯 핸들링</span>
                                                            <span className="text-white">{car.baseHandling}</span>
                                                        </div>
                                                        <div className="w-full bg-slate-800 h-1 rounded-full overflow-hidden">
                                                            <div className="bg-green-500 h-full" style={{ width: `${(car.baseHandling / 15) * 100}%` }}></div>
                                                        </div>
                                                    </div>

                                                    {isOwned ? (
                                                        <button
                                                            onClick={() => {
                                                                if (canSell) {
                                                                    if (confirm(`정말로 [${car.name}] 차량을 판매하시겠습니까?\n판매 시 2포인트를 돌려받습니다.`)) {
                                                                        const newOwned = ownedCars.filter(id => id !== carId);
                                                                        const nextPoints = upgradePoints + 2;
                                                                        setOwnedCars(newOwned);
                                                                        
                                                                        let nextActive = activeCar;
                                                                        if (activeCar === carId) {
                                                                            nextActive = newOwned[0] || 'lv1';
                                                                            setActiveCar(nextActive);
                                                                        }
                                                                        
                                                                        setUpgradePoints(nextPoints);
                                                                        saveProgress(level, totalExp, parts, nextPoints, newOwned, nextActive, hasSelectedInitialCar, hasSeenLv2Popup);
                                                                        
                                                                        alert(`[${car.name}] 판매가 완료되었습니다. (+2포인트 적립 💰)`);
                                                                    }
                                                                }
                                                            }}
                                                            disabled={!canSell}
                                                            className={`w-full py-2 rounded-xl text-xs font-bold font-jua transition-all active:scale-95 shadow-md flex items-center justify-center gap-1

                                                                    ? 'bg-gradient-to-r from-red-500 to-rose-600 hover:from-red-400 hover:to-rose-500 text-white' 
                                                                    : 'bg-slate-800 text-slate-500 border border-slate-700 cursor-not-allowed text-[10px]'
                                                                }`}
                                                        >
                                                            {canSell ? '차량 판매하기 (2포인트 반환 💰)' : '기본 차량 판매 불가 🔒'}
                                                        </button>
                                                    ) : (
                                                        <button
                                                            onClick={() => {
                                                                if (canBuy) {
                                                                    const newOwned = [...new Set([...ownedCars, carId])];
                                                                    const newPoints = upgradePoints - cost;
                                                                    setOwnedCars(newOwned);
                                                                    setActiveCar(carId);
                                                                    setUpgradePoints(newPoints);
                                                                    setShowShopModal(false);
                                                                    saveProgress(level, totalExp, parts, newPoints, newOwned, carId, hasSelectedInitialCar, hasSeenLv2Popup);
                                                                    confetti({
                                                                        particleCount: 80,
                                                                        spread: 70,
                                                                        origin: { y: 0.6 }
                                                                    });
                                                                }
                                                            }}
                                                            disabled={!canBuy}
                                                            className={`w-full py-2 rounded-xl text-xs font-bold font-jua transition-all ${canBuy
                                                                    ? 'bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-400 hover:to-purple-500 text-white shadow-md active:scale-95'
                                                                    : 'bg-slate-800 text-slate-500 border border-slate-700 cursor-not-allowed text-[10px]'
                                                                }`}
                                                        >

                                                                ? `Lv.${reqLevel} 해금 필요 (현재 Lv.${level})`

                                                                    : `포인트 부족 (${cost}포인트 필요)`}
                                                        </button>
                                                    )}
                                                </div>
                                            );
                                        })}
                                </div>
                            </div>
                        </div>

                                className="bg-slate-950/95 border-2 border-indigo-500/60 rounded-3xl p-6 max-w-2xl w-full shadow-[0_0_45px_rgba(99,102,241,0.55)] flex flex-col items-center relative"
                                onClick={(e) => e.stopPropagation()}
                            >
                                <button
                                    onClick={() => setShowImageModal(false)}
                                    className="absolute top-4 right-4 text-slate-400 hover:text-white text-xl font-bold p-1 bg-slate-900 rounded-lg w-8 h-8 flex items-center justify-center border border-slate-800 transition-colors"
                                >
                                    ✕
                                </button>

                                <h3 className="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-300 via-purple-300 to-pink-300 font-jua mb-4 tracking-wide text-center">
                                    🏎️ {selectedImageName} 실물 보기
                                </h3>

                                <div className="w-full overflow-hidden rounded-2xl border border-indigo-500/30 bg-slate-900 shadow-inner mb-4 relative group">
                                    <img
                                        src={selectedImageUrl}
                                        alt={selectedImageName}
                                        className="w-full h-auto max-h-[60vh] object-contain mx-auto rounded-2xl"
                                    />
                                    <div className="absolute inset-0 bg-gradient-to-t from-slate-950/70 via-transparent to-transparent opacity-60"></div>
                                </div>

                                {(() => {
                                    const matchedCar = Object.values(CAR_DATA).find(c => c.name === selectedImageName);
                                    if (!matchedCar) return null;
                                    return (
                                        <div className="w-full bg-slate-900/60 border border-slate-800 rounded-xl p-4 text-center mb-5 max-w-lg">
                                            <p className="text-slate-300 text-xs sm:text-sm font-medium leading-relaxed break-keep font-jua">
                                                "{matchedCar.desc}"
                                            </p>
                                            <div className="flex justify-center gap-6 mt-3 text-[11px] font-bold">
                                                <span className="text-red-400">⚡ 최고속도: {matchedCar.baseSpeed} km/h</span>
                                                <span className="text-yellow-400">🔥 가속도: {matchedCar.baseAccel}</span>
                                                <span className="text-green-400">🎯 핸들링: {matchedCar.baseHandling}</span>
                                            </div>
                                        </div>
                                    );
                                })()}

                                <button
                                    onClick={() => setShowImageModal(false)}
                                    className="bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-400 hover:to-purple-500 text-white font-bold py-2.5 px-8 rounded-xl transition-all active:scale-95 text-sm font-jua shadow-lg shadow-indigo-500/20"
                                >
                                    화면 닫기
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Reset Confirmation Modal */}
                    {showResetModal && (
                        <div className="fixed inset-0 bg-black/85 backdrop-blur-md flex items-center justify-center z-50 p-4 animate-fadeIn">
                            <div className="bg-slate-900 border border-red-500/50 rounded-3xl p-6 max-w-sm w-full text-center shadow-[0_0_30px_rgba(239,68,68,0.2)]">
                                <div className="text-4xl mb-3 animate-pulse text-red-500">⚠️</div>
                                <h3 className="text-xl font-bold text-white mb-2 font-jua">게임 초기화 경고</h3>
                                <p className="text-slate-300 text-xs mb-4 break-keep">
                                    초기화 진행 시 모든 레벨, 획득한 차량, 부품 등 모든 게임 정보가 **영구적으로 삭제**됩니다.
                                </p>
                                <div className="mb-4">
                                    <input
                                        type="password"
                                        value={resetPasswordInput}
                                        onChange={(e) => setResetPasswordInput(e.target.value)}
                                        placeholder="비밀번호 입력"
                                        className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-center text-white text-lg focus:outline-none focus:border-red-500 font-bold placeholder:font-normal"
                                    />
                                    {resetError && <p className="text-red-400 text-xs font-bold mt-2">{resetError}</p>}
                                </div>
                                <div className="flex gap-2">
                                    <button
                                        onClick={() => setShowResetModal(false)}
                                        className="flex-1 bg-slate-800 hover:bg-slate-700 text-white font-bold py-2 rounded-xl text-xs transition-colors"
                                    >
                                        취소
                                    </button>
                                    <button
                                        onClick={() => {
                                            if (resetPasswordInput === '1206') {
                                                const defaultData = {
                                                    level: 1,
                                                    totalExp: 0,
                                                    parts: { engine: 0, mission: 0, tire: 0, brake: 0 },
                                                    upgradePoints: 0,
                                                    ownedCars: ['lv1'],
                                                    activeCar: 'lv1',
                                                    hasSelectedInitialCar: false,
                                                    hasSeenLv2Popup: false
                                                };
                                                dbService.saveProgress(currentUser, defaultData).then(() => {
                                                    window.location.reload();
                                                });
                                            } else {
                                                setResetError('비밀번호가 올바르지 않습니다!');
                                            }
                                        }}
                                        className="flex-1 bg-red-600 hover:bg-red-500 text-white font-bold py-2 rounded-xl text-xs transition-colors shadow-md active:scale-95"
                                    >
                                        확인 (초기화)
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Ranking Board Modal */}
                    {showRankingModal && (() => {
                        const sortedRanking = [...rankingData].sort((a, b) => {
                            if (rankingTab === 'level') {
                                const aLvl = a.level || 1;
                                const bLvl = b.level || 1;
                                if (bLvl !== aLvl) return bLvl - aLvl;

                                const aExp = a.totalExp || 0;
                                const bExp = b.totalExp || 0;
                                if (bExp !== aExp) return bExp - aExp;

                                return (a.id || '').localeCompare(b.id || '');
                            } else { // 'speed'
                                const aSpeed = a.maxSpeed || 200;
                                const bSpeed = b.maxSpeed || 200;
                                if (bSpeed !== aSpeed) return bSpeed - aSpeed;

                                const aLvl = a.level || 1;
                                const bLvl = b.level || 1;
                                if (bLvl !== aLvl) return bLvl - aLvl;

                                return (a.id || '').localeCompare(b.id || '');
                            }
                        });

                        return (
                            <div className="fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center z-50 p-4 animate-fadeIn font-jua">
                                <div className="bg-slate-950/90 border border-yellow-400/50 shadow-[0_0_30px_rgba(250,204,21,0.25)] rounded-3xl p-6 sm:p-8 max-w-lg w-full backdrop-blur-md relative z-50 flex flex-col max-h-[90vh] text-white">
                                    {/* Header */}
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-2xl font-bold text-yellow-400 flex items-center gap-2">
                                            🏆 명예의 전당 (실시간 랭킹)
                                        </h2>
                                        <button
                                            onClick={() => setShowRankingModal(false)}
                                            className="text-slate-400 hover:text-white text-xl font-bold p-1 bg-slate-900 rounded-lg w-8 h-8 flex items-center justify-center transition-colors"
                                        >
                                            ✕
                                        </button>
                                    </div>

                                    {/* Tabs */}
                                    <div className="flex gap-2 mb-4 bg-slate-900 p-1 rounded-xl border border-slate-800">
                                        <button
                                            onClick={() => setRankingTab('level')}
                                            className={`flex-1 py-2 px-3 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-1 ${rankingTab === 'level'
                                                    ? 'bg-yellow-400 text-yellow-950 font-extrabold shadow-md'
                                                    : 'text-slate-400 hover:text-white'
                                                }`}
                                        >
                                            ⭐ 레벨 순
                                        </button>
                                        <button
                                            onClick={() => setRankingTab('speed')}
                                            className={`flex-1 py-2 px-3 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-1 ${rankingTab === 'speed'
                                                    ? 'bg-yellow-400 text-yellow-950 font-extrabold shadow-md'
                                                    : 'text-slate-400 hover:text-white'
                                                }`}
                                        >
                                            🔥 최고속도 순
                                        </button>
                                    </div>

                                    {/* Loading State */}
                                    {rankingLoading ? (
                                        <div className="flex-1 flex flex-col items-center justify-center py-12 gap-3">
                                            <div className="w-10 h-10 border-4 border-yellow-400 border-t-transparent rounded-full animate-spin"></div>
                                            <p className="text-slate-400 text-sm animate-pulse">실시간 순위 분석 중...</p>
                                        </div>
                                    ) : sortedRanking.length === 0 ? (
                                        <div className="flex-1 flex items-center justify-center py-12 text-slate-500">
                                            등록된 플레이어가 없습니다.
                                        </div>
                                    ) : (
                                        /* Rankings List */
                                        <div className="flex-1 overflow-y-auto pr-1 space-y-2.5 max-h-[55vh] custom-scrollbar">
                                            {sortedRanking.map((item, index) => {
                                                const isSelf = item.id === currentUser;
                                                const rankNum = index + 1;

                                                // 1, 2, 3위 메달 및 로우 그라데이션
                                                let rowStyle = "bg-slate-900/60 border border-slate-800 hover:border-slate-700";
                                                let badge = null;
                                                let rankText = <span className="text-slate-400 font-bold text-sm w-6 text-center">{rankNum}</span>;

                                                if (rankNum === 1) {
                                                    rowStyle = "bg-gradient-to-r from-yellow-500/25 to-amber-500/10 border border-yellow-400/50";
                                                    badge = "🥇";
                                                    rankText = <span className="text-2xl w-6 text-center">{badge}</span>;
                                                } else if (rankNum === 2) {
                                                    rowStyle = "bg-gradient-to-r from-slate-300/20 to-slate-400/5 border border-slate-300/40";
                                                    badge = "🥈";
                                                    rankText = <span className="text-2xl w-6 text-center">{badge}</span>;
                                                } else if (rankNum === 3) {
                                                    rowStyle = "bg-gradient-to-r from-amber-600/20 to-amber-700/5 border border-amber-600/40";
                                                    badge = "🥉";
                                                    rankText = <span className="text-2xl w-6 text-center">{badge}</span>;
                                                }

                                                // 본인 계정 테두리 강조
                                                if (isSelf) {
                                                    rowStyle = `bg-indigo-950/40 border-2 border-indigo-400 shadow-[0_0_12px_rgba(129,140,248,0.25)]`;
                                                }

                                                const carName = item.activeCarName || CAR_DATA[item.activeCar || 'lv1']?.name || '연습 차량';

                                                return (
                                                    <div
                                                        key={item.id}
                                                        className={`flex items-center justify-between p-3.5 rounded-2xl transition-all ${rowStyle}`}
                                                    >
                                                        <div className="flex items-center gap-3 min-w-0">
                                                            {/* 본인일 경우 좌측 지시 화살표 */}
                                                            {isSelf && (
                                                                <span className="text-indigo-400 text-sm animate-pulse">▶</span>
                                                            )}
                                                            {rankText}
                                                            <div className="flex flex-col min-w-0">
                                                                <div className="flex items-center gap-1.5">
                                                                    <span className={`font-bold text-sm truncate ${isSelf ? 'text-indigo-300' : 'text-slate-200'}`}>
                                                                        {item.id}
                                                                    </span>
                                                                    {isSelf && (
                                                                        <span className="bg-indigo-500/20 border border-indigo-500/40 text-indigo-300 text-[9px] px-1.5 py-0.5 rounded-md font-extrabold">
                                                                            YOU
                                                                        </span>
                                                                    )}
                                                                </div>
                                                                <span className="text-[10px] text-slate-400 font-medium truncate mt-0.5">
                                                                    🚗 {carName}
                                                                </span>
                                                            </div>
                                                        </div>

                                                        {/* 스펙 정보 */}
                                                        <div className="flex items-center gap-4 text-right shrink-0">
                                                            <div className="flex flex-col">
                                                                <span className="text-yellow-400 font-bold text-sm">
                                                                    Lv.{item.level || 1}
                                                                </span>
                                                                <span className="text-[9px] text-slate-500 font-bold">
                                                                    {item.totalExp || 0} EXP
                                                                </span>
                                                            </div>
                                                            <div className="border-l border-slate-800 h-6"></div>
                                                            <div className="flex flex-col min-w-[70px]">
                                                                <span className="text-red-400 font-extrabold text-sm">
                                                                    ⚡ {item.maxSpeed || 200}
                                                                </span>
                                                                <span className="text-[8px] text-red-500/70 font-extrabold">
                                                                    km/h
                                                                </span>
                                                            </div>

                                                            {/* 일일 대결하기 버튼: 본인 제외 */}
                                                            {!isSelf && (() => {
                                                                const todayStr = new Date().toISOString().split('T')[0];
                                                                const isCompleted = !!(lastMatchMap && lastMatchMap[item.id] === todayStr);
                                                                return (
                                                                    <button
                                                                        onClick={() => handleStartBattle(item)}
                                                                        disabled={isCompleted}
                                                                        className={`ml-1.5 px-2.5 py-1.5 rounded-xl font-bold text-xs transition-all active:scale-95 flex items-center gap-0.5 ${isCompleted
                                                                                ? 'bg-slate-800 text-slate-500 border border-slate-700 cursor-not-allowed text-[10px]'
                                                                                : 'bg-gradient-to-r from-yellow-400 to-amber-500 hover:from-yellow-300 hover:to-amber-400 text-slate-950 font-extrabold shadow-md transform hover:scale-105'
                                                                            }`}
                                                                    >
                                                                        {isCompleted ? (
                                                                            <>
                                                                                <span>🔒 완료</span>
                                                                            </>
                                                                        ) : (
                                                                            <>
                                                                                <span>⚔️ 대결</span>
                                                                            </>
                                                                        )}
                                                                    </button>
                                                                );
                                                            })()}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}

                                    {/* Footer */}
                                    <div className="mt-5 pt-3 border-t border-slate-900 flex justify-between items-center text-[10px] text-slate-500 font-semibold pl-1">
                                        <span>🏁 실시간 데이터 동기화 완료</span>
                                        <button
                                            onClick={() => setShowRankingModal(false)}
                                            className="bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-300 font-bold py-2 px-6 rounded-xl transition-all active:scale-95 text-xs"
                                        >
                                            닫기
                                        </button>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {/* Circuit Battle Stadium Modal */}
                    {showBattleModal && (() => {
                        const oppId = battleOpponent?.id || '상대 드라이버';
                        const oppCarName = battleOpponent?.activeCarName || CAR_DATA[battleOpponent?.activeCar || 'lv1']?.name || '연습 차량';

                        // 삼각함수 연산을 통한 SVG 원형 좌표 계산
                        const getCoords = (distance) => {
                            const ratio = distance / 10000;
                            const angle = ratio * 2 * Math.PI - Math.PI / 2; // 12시 방향 오프셋
                            const radius = 75; // 원 반경
                            const cx = 100;
                            const cy = 100;
                            return {
                                x: cx + radius * Math.cos(angle),
                                y: cy + radius * Math.sin(angle)
                            };
                        };

                        const pPos = getCoords(playerDistance);
                        const oPos = getCoords(opponentDistance);

                        // 시간 포맷 헬퍼
                        const formatLapTime = (sec) => {
                            const m = Math.floor(sec / 60).toString().padStart(2, '0');
                            const s = Math.floor(sec % 60).toString().padStart(2, '0');
                            const ms = Math.floor((sec % 1) * 100).toString().padStart(2, '0');
                            return `${m}:${s}.${ms}`;
                        };

                        return (
                            <div className="fixed inset-0 bg-slate-950/95 backdrop-blur-md flex items-center justify-center z-50 p-4 animate-fadeIn font-jua">
                                <div className="bg-slate-900 border-2 border-indigo-500/60 shadow-[0_0_40px_rgba(99,102,241,0.3)] rounded-3xl p-6 sm:p-8 max-w-xl w-full flex flex-col items-center relative overflow-hidden text-white animate-fadeIn">
                                    {/* Neon Grid Effect */}
                                    <div className="absolute inset-0 opacity-5 pointer-events-none"
                                        style={{ backgroundImage: 'radial-gradient(#ffffff 2px, transparent 2px)', backgroundSize: '15px 15px' }}></div>

                                    {/* Close Button */}
                                    <button
                                        onClick={handleCloseBattle}
                                        className="absolute top-4 right-4 text-slate-400 hover:text-white hover:scale-110 active:scale-95 transition-all duration-200 z-30"
                                        title="나가기"
                                    >
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}>
                                            <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
                                        </svg>
                                    </button>

                                    {/* Header */}
                                    <h2 className="text-2xl sm:text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 mb-2 tracking-wide drop-shadow-sm flex items-center gap-1.5 z-10">
                                        🏟️ 서킷 배틀 스타디움
                                    </h2>
                                    <p className="text-slate-400 text-xs sm:text-sm mb-5 z-10 text-center font-medium">
                                        10km 원형 서킷을 정복할 최강의 드라이버를 가립니다!
                                    </p>

                                    {/* Ready State */}
                                    {battleState === 'ready' && (
                                        <div className="w-full flex flex-col items-center gap-5 z-10">
                                            <div className="grid grid-cols-2 gap-4 w-full">
                                                {/* Player Spec Card */}
                                                <div className="bg-indigo-950/40 border border-indigo-500/30 rounded-2xl p-4 text-center">
                                                    <span className="bg-indigo-500/20 border border-indigo-500/40 text-indigo-300 text-[10px] px-2 py-0.5 rounded-full font-bold">DRIVER</span>
                                                    <h3 className="text-lg font-bold text-indigo-300 mt-2 truncate">{currentUser}</h3>
                                                    <div className="mt-3 text-xs space-y-1 text-slate-300 text-left pl-3">
                                                        <div>⚡ 최고속도: <span className="text-yellow-400 font-extrabold">{calculateSpeed()}km/h</span></div>
                                                        <div>🔥 가속도: <span className="text-yellow-400 font-extrabold">{calculateAccel()}/10</span></div>
                                                    </div>
                                                </div>
                                                {/* Opponent Spec Card */}
                                                <div className="bg-orange-950/40 border border-orange-500/30 rounded-2xl p-4 text-center">
                                                    <span className="bg-orange-500/20 border border-orange-500/40 text-orange-300 text-[10px] px-2 py-0.5 rounded-full font-bold">CHALLENGER</span>
                                                    <h3 className="text-lg font-bold text-orange-300 mt-2 truncate">{oppId}</h3>
                                                    <div className="mt-3 text-xs space-y-1 text-slate-300 text-left pl-3">
                                                        <div>⚡ 최고속도: <span className="text-yellow-400 font-extrabold">{battleOpponent?.maxSpeed || 200}km/h</span></div>
                                                        <div>🔥 가속도: <span className="text-yellow-400 font-extrabold">{getAccelVal(battleOpponent?.activeCar || 'lv1', battleOpponent?.parts || { engine: 0, mission: 0, tire: 0, brake: 0 })}/10</span></div>
                                                    </div>
                                                </div>
                                            </div>

                                            {/* Signal Deco */}
                                            <div className="flex gap-2 mb-2">
                                                <span className="w-5 h-5 rounded-full bg-red-600 shadow-[0_0_10px_#ef4444] animate-pulse"></span>
                                                <span className="w-5 h-5 rounded-full bg-yellow-600 opacity-30"></span>
                                                <span className="w-5 h-5 rounded-full bg-green-600 opacity-30"></span>
                                            </div>

                                            <div className="w-full flex flex-col gap-2">
                                                <button
                                                    onClick={handleLaunchBattle}
                                                    className="w-full py-3.5 bg-gradient-to-r from-indigo-500 via-purple-600 to-pink-500 hover:from-indigo-400 hover:to-pink-400 text-white font-extrabold text-lg rounded-2xl shadow-xl transform transition hover:scale-[1.03] active:scale-95 flex items-center justify-center gap-2 animate-pulse"
                                                >
                                                    <span>🚦 START BATTLE</span>
                                                </button>
                                                <button
                                                    onClick={handleCloseBattle}
                                                    className="w-full py-2.5 bg-slate-800/80 hover:bg-slate-700/80 text-slate-300 hover:text-white font-bold text-sm rounded-2xl border border-slate-700 transition transform hover:scale-[1.02] active:scale-95 flex items-center justify-center gap-2"
                                                >
                                                    <span>↩️ 대결 나가기</span>
                                                </button>
                                            </div>
                                        </div>
                                    )}

                                    {/* Racing & Finished State */}
                                    {(battleState === 'racing' || battleState === 'finished') && (
                                        <div className="w-full flex flex-col items-center z-10">
                                            {/* 2D Circular SVG Circuit */}
                                            <div className="relative w-48 h-48 sm:w-56 sm:h-56 bg-slate-950/70 border-4 border-slate-800 rounded-full flex items-center justify-center p-2 shadow-inner">
                                                <svg viewBox="0 0 200 200" className="w-full h-full transform -rotate-90">
                                                    {/* Outer Ring Road */}
                                                    <circle cx="100" cy="100" r="75" fill="none" stroke="#1e293b" strokeWidth="12" />
                                                    {/* Central Dashed Track Divider */}
                                                    <circle cx="100" cy="100" r="75" fill="none" stroke="#334155" strokeWidth="1" strokeDasharray="3 3" />

                                                    {/* Start / Finish Line */}
                                                    <line x1="100" y1="18" x2="100" y2="32" stroke="#ef4444" strokeWidth="2.5" />

                                                    {/* Player Car Node */}
                                                    <circle
                                                        cx={pPos.x}
                                                        cy={pPos.y}
                                                        r="6"
                                                        fill="#3b82f6"
                                                        className="animate-pulse"
                                                        style={{ filter: 'drop-shadow(0 0 6px #3b82f6)' }}
                                                    />

                                                    {/* Opponent Car Node */}
                                                    <circle
                                                        cx={oPos.x}
                                                        cy={oPos.y}
                                                        r="6"
                                                        fill="#f97316"
                                                        className="animate-pulse"
                                                        style={{ filter: 'drop-shadow(0 0 6px #f97316)' }}
                                                    />
                                                </svg>

                                                {/* Center Digital LapTime Timer */}
                                                <div className="absolute flex flex-col items-center text-center">
                                                    <span className="text-[9px] text-slate-500 font-extrabold tracking-wider">LAPTIME</span>
                                                    <span className="text-xl sm:text-2xl font-black text-emerald-400 font-mono tracking-wider drop-shadow-sm">
                                                        {formatLapTime(battleTime)}
                                                    </span>
                                                    <span className="text-[8px] text-indigo-400 font-bold mt-1">10km CIRCUIT</span>
                                                </div>
                                            </div>

                                            {/* HUD Panels for Player & Opponent */}
                                            <div className="w-full mt-5 space-y-3 font-sans">
                                                {/* Player Info */}
                                                <div className="bg-slate-950/50 border border-indigo-500/20 rounded-xl p-2.5 flex items-center justify-between">
                                                    <div className="flex items-center gap-2">
                                                        <span className="w-2.5 h-2.5 rounded-full bg-blue-500 animate-pulse"></span>
                                                        <span className="font-jua text-xs text-indigo-300 font-bold truncate max-w-[90px]">{currentUser}</span>
                                                    </div>
                                                    <div className="flex gap-4 text-xs font-bold text-slate-300 font-jua">
                                                        <span>🏁 {Math.floor(playerDistance)}m / 10,000m</span>
                                                        <span className="text-blue-400">⚡ {Math.floor(playerSpeed)}km/h</span>
                                                    </div>
                                                </div>

                                                {/* Opponent Info */}
                                                <div className="bg-slate-950/50 border border-orange-500/20 rounded-xl p-2.5 flex items-center justify-between">
                                                    <div className="flex items-center gap-2">
                                                        <span className="w-2.5 h-2.5 rounded-full bg-orange-500 animate-pulse"></span>
                                                        <span className="font-jua text-xs text-orange-300 font-bold truncate max-w-[90px]">{oppId}</span>
                                                    </div>
                                                    <div className="flex gap-4 text-xs font-bold text-slate-300 font-jua">
                                                        <span>🏁 {Math.floor(opponentDistance)}m / 10,000m</span>
                                                        <span className="text-orange-400">⚡ {Math.floor(opponentSpeed)}km/h</span>
                                                    </div>
                                                </div>
                                            </div>
                                            {battleState === 'racing' && (
                                                <button
                                                    onClick={handleCloseBattle}
                                                    className="w-full mt-4 py-2.5 bg-slate-800/60 hover:bg-slate-700/80 border border-slate-800 text-slate-400 hover:text-red-400 font-bold text-xs rounded-xl transition-all active:scale-95 flex items-center justify-center gap-1.5"
                                                >
                                                    <span>🏳️ 기권하고 나가기</span>
                                                </button>
                                            )}
                                        </div>
                                    )}

                                    {/* Finished Match Result Panel */}
                                    {battleState === 'finished' && (
                                        <div className="w-full flex flex-col items-center mt-5 bg-slate-950/80 border border-slate-800 rounded-2xl p-4 text-center animate-fadeIn z-20">
                                            {battleWinner === 'player' ? (
                                                <div className="animate-bounce">
                                                    <h3 className="text-3xl text-yellow-400 font-extrabold flex items-center gap-1.5 justify-center">
                                                        🎉 대 승 리 🏆
                                                    </h3>
                                                    <p className="text-green-400 text-sm mt-1 font-bold font-jua">보상: 튜닝 숍 포인트 +1 획득!</p>
                                                </div>
                                            ) : (
                                                <div>
                                                    <h3 className="text-2xl text-red-500 font-extrabold">
                                                        아쉬운 패배 😢
                                                    </h3>
                                                    <p className="text-slate-400 text-xs mt-1 break-keep leading-relaxed font-semibold">
                                                        상대방 차량의 기록이 더 빠릅니다.<br />부품을 튜닝하거나 신차를 해금하여 재도전하세요!
                                                    </p>
                                                </div>
                                            )}

                                            {/* LapTime Comparer */}
                                            <div className="mt-4 w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-xs flex justify-around">
                                                <div>
                                                    <div className="text-slate-500 font-bold">나의 기록</div>
                                                    <div className="text-blue-400 font-mono font-extrabold text-base mt-0.5">
                                                        {formatLapTime(calcPhysicsTime(calculateSpeed(), calculateAccel()))}
                                                    </div>
                                                </div>
                                                <div className="border-l border-slate-800 h-8"></div>
                                                <div>
                                                    <div className="text-slate-500 font-bold">상대 기록</div>
                                                    <div className="text-orange-400 font-mono font-extrabold text-base mt-0.5">
                                                        {formatLapTime(calcPhysicsTime(
                                                            battleOpponent?.maxSpeed || 200,
                                                            getAccelVal(battleOpponent?.activeCar || 'lv1', battleOpponent?.parts || { engine: 0, mission: 0, tire: 0, brake: 0 })
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>

                                            <button
                                                onClick={handleCloseBattle}
                                                className="w-full mt-4 bg-slate-800 hover:bg-slate-700 text-white font-bold py-2.5 rounded-xl transition-all active:scale-95 text-sm"
                                            >
                                                경기장 서킷 나가기 🏁
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        );
                    })()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
