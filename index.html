    <style>
        body {
            font-family: 'Jua', sans-serif;
            background-color: #f0fdf4;
            /* Light green background */
            margin: 0;
            padding: 0;
            touch-action: manipulation;
        }

        .problem-card {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .problem-card.solved {
            background-color: #dcfce7;
            /* Green for solved */
            border: 2px solid #22c55e;
            transform: scale(1.02);
        }

        .input-box {
            font-family: 'Jua', sans-serif;
            appearance: none;
            -moz-appearance: textfield;
        }

        .input-box::-webkit-outer-spin-button,
        .input-box::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Float animation for the car */
        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-5px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        /* FadeIn animation for modals */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .animate-fadeIn {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>

                name: '아우디 R8',
                image: 'car/audi_r8.jpg',
                baseSpeed: 380,

                desc: 'V10 미드쉽 엔진을 품은 아우디 모터스포츠 기술력의 정수, 궁극의 하이퍼카'
            }

        // 최고속도 연산 순수 함수
        const getSpeedVal = (carId, partsVal) => {
            const car = CAR_DATA[carId] || CAR_DATA.lv1;
            const base = car.baseSpeed;
            const partBonus = (partsVal.engine * 3) + (partsVal.mission * 2) + (partsVal.tire * 2) + (partsVal.brake * 2);
            const minLevel = Math.min(partsVal.engine, partsVal.mission, partsVal.tire, partsVal.brake);
            const balanceBonus = minLevel * 15;
            return base + partBonus + balanceBonus;
        };

        // 가속도 연산 순수 함수 (무제한)
        const getAccelVal = (carId, partsVal) => {
            const car = CAR_DATA[carId] || CAR_DATA.lv1;
            const base = car.baseAccel;
            const upgradeBonus = (partsVal.engine * 0.15) + (partsVal.mission * 0.1) + (partsVal.tire * 0.1);
            return parseFloat((base + upgradeBonus).toFixed(2));
        };

        // 핸들링 연산 순수 함수
        const getHandlingVal = (carId, partsVal) => {
            const car = CAR_DATA[carId] || CAR_DATA.lv1;
            const base = car.baseHandling || 5.0;
            const upgradeBonus = (partsVal.mission * 0.1) + (partsVal.tire * 0.15) + (partsVal.brake * 0.1);
            return parseFloat((base + upgradeBonus).toFixed(2));
        };

        // ==========================================
        // [필독] Firebase 연결 설정 정보 기입
        // ==========================================
        // 본인의 Firebase 웹 프로젝트 설정 값을 여기에 붙여넣어 주세요.
        // 비워두면 자동으로 브라우저 내 '로컬 모의 클라우드(Mock Cloud DB)' 모드로 안전하게 작동합니다.
        const firebaseConfig = {
            apiKey: "AIzaSyD0jJfd1uyjzpYqN3cyLHn1sVr7dIkxQac",
            authDomain: "my-family-ab699.firebaseapp.com",
            projectId: "my-family-ab699",
            storageBucket: "my-family-ab699.firebasestorage.app",
            messagingSenderId: "289127412048",
            appId: "1:289127412048:web:cd5f0b40f4bd6a56a5bc55",
            measurementId: "G-GLH78VGYSF"
        };

        // 데이터베이스 통합 제어 서비스 (Firestore & Local Mock Cloud 호환)
        const dbService = {
            isFirebase: false,
            firestore: null,

            init() {
                const hasConfig = firebaseConfig && firebaseConfig.apiKey && firebaseConfig.apiKey.trim() !== "";
                if (hasConfig) {
                    try {
                        if (!firebase.apps.length) {
                            firebase.initializeApp(firebaseConfig);
                        }
                        this.firestore = firebase.firestore();
                        this.isFirebase = true;
                        console.log("🟢 Firebase Firestore 클라우드 연결 완료!");
                    } catch (error) {
                        console.error("🔴 Firebase 초기화 에러 (로컬 모의 클라우드로 대체):", error);
                        this.isFirebase = false;
                    }
                } else {
                    console.log("🔵 Firebase 설정 없음 - 로컬 모의 클라우드로 작동합니다.");
                    this.isFirebase = false;
                }
            },

            // 로컬 모의 클라우드 헬퍼 (로컬스토리지 모의 DB)
            _getLocalUsers() {
                try {
                    const data = localStorage.getItem('racer-mock-cloud-users');
                    return data ? JSON.parse(data) : {};
                } catch (e) {
                    return {};
                }
            },

            _saveLocalUsers(users) {
                try {
                    localStorage.setItem('racer-mock-cloud-users', JSON.stringify(users));
                } catch (e) {
                    console.error("로컬 백업 저장 실패:", e);
                }
            },

            // 로그인 처리
            async login(id, password) {
                const normalizedId = id.trim().toLowerCase();
                if (!normalizedId) throw new Error("아이디를 입력해주세요.");

                if (this.isFirebase) {
                    try {
                        const doc = await this.firestore.collection('racer_users').doc(normalizedId).get();
                        if (!doc.exists) {
                            throw new Error("존재하지 않는 아이디입니다.");
                        }
                        const userData = doc.data();
                        if (userData.password !== password) {
                            throw new Error("비밀번호가 올바르지 않습니다.");
                        }
                        return userData;
                    } catch (error) {
                        console.error("Firebase 로그인 실패:", error);
                        throw error;
                    }
                } else {
                    // 로컬 모의 클라우드 로그인
                    const users = this._getLocalUsers();
                    const user = users[normalizedId];
                    if (!user) {
                        throw new Error("존재하지 않는 아이디입니다.");
                    }
                    if (user.password !== password) {
                        throw new Error("비밀번호가 올바르지 않습니다.");
                    }
                    return user;
                }
            },

            // 회원가입 처리
            async register(id, password) {
                const normalizedId = id.trim().toLowerCase();
                if (!normalizedId) throw new Error("아이디를 입력해주세요.");
                if (!password || password.trim() === "") throw new Error("비밀번호를 입력해주세요.");

                // 기본 시작 정보
                const defaultData = {
                    id: normalizedId,
                    password: password,
                    level: 1,
                    totalExp: 0,
                    parts: { engine: 0, mission: 0, tire: 0, brake: 0 },
                    upgradePoints: 0,
                    ownedCars: ['lv1'],
                    activeCar: 'lv1',
                    hasSelectedInitialCar: false,
                    hasSeenLv2Popup: false,
                    updatedAt: new Date().toISOString()
                };

                if (this.isFirebase) {
                    try {
                        const docRef = this.firestore.collection('racer_users').doc(normalizedId);
                        const doc = await docRef.get();
                        if (doc.exists) {
                            throw new Error("이미 존재하는 아이디입니다.");
                        }
                        await docRef.set(defaultData);
                        return defaultData;
                    } catch (error) {
                        console.error("Firebase 회원가입 실패:", error);
                        throw error;
                    }
                } else {
                    // 로컬 모의 클라우드 가입
                    const users = this._getLocalUsers();
                    if (users[normalizedId]) {
                        throw new Error("이미 존재하는 아이디입니다.");
                    }
                    users[normalizedId] = defaultData;
                    this._saveLocalUsers(users);
                    return defaultData;
                }
            },

            // 데이터 클라우드 동기화 저장
            async saveProgress(id, progressData) {
                const normalizedId = id.trim().toLowerCase();
                if (!normalizedId) return;

                if (this.isFirebase) {
                    try {
                        await this.firestore.collection('racer_users').doc(normalizedId).update({
                            ...progressData,
                            updatedAt: new Date().toISOString()
                        });
                        console.log("☁️ Firestore 클라우드 저장 완료");
                    } catch (error) {
                        console.error("Firestore 저장 실패 (배경 백업):", error);
                    }
                } else {
                    // 로컬 모의 클라우드 업데이트
                    const users = this._getLocalUsers();
                    if (users[normalizedId]) {
                        users[normalizedId] = {
                            ...users[normalizedId],
                            ...progressData,
                            updatedAt: new Date().toISOString()
                        };
                        this._saveLocalUsers(users);
                        console.log("💾 로컬 모의 클라우드 데이터 저장 완료");
                    }
                }
            },

            // 실시간 랭킹 수집 메서드
            async fetchRankings() {
                if (this.isFirebase) {
                    try {
                        const snapshot = await this.firestore.collection('racer_users').get();
                        const list = [];
                        snapshot.forEach(doc => {
                            list.push(doc.data());
                        });
                        return list;
                    } catch (error) {
                        console.error("Firebase 랭킹 수집 실패:", error);
                        throw error;
                    }
                } else {
                    const usersObj = this._getLocalUsers();
                    return Object.values(usersObj);
                }
            }
        };

        // DB 서비스 즉시 이니셜라이즈
        dbService.init();

        // 문제 생성 유틸리티 함수
        const generateProblem = (isToddler = false, isAdult = false, currentLevel = 1) => {
            if (isToddler) {
                // 유아모드: 1 ~ 5 사이의 과일 개수 세기 방식
                const fruits = ['🍎', '🍌', '🍇', '🍓', '🍊'];
                const chosenFruit = fruits[Math.floor(Math.random() * fruits.length)];
                const count = Math.floor(Math.random() * 5) + 1; // 1 ~ 5 제한
                return {
                    id: Math.random().toString(36).substr(2, 9),
                    type: 'toddler',
                    fruit: chosenFruit,
                    fruitCount: count,
                    numbers: [count],
                    ops: [],
                    answer: count
                };
            }
            if (isAdult) {
                // 성인모드: 세 자리 숫자 더하기 빼기
                const type = Math.floor(Math.random() * 2) + 1;
                if (type === 1) {
                    // 세자리 수 2개 연산
                    const a = Math.floor(Math.random() * 900) + 100; // 100 ~ 999
                    const b = Math.floor(Math.random() * 900) + 100; // 100 ~ 999
                    const op = Math.random() > 0.5 ? '+' : '-';

                    const finalA = op === '-' && a < b ? b : a;
                    const finalB = op === '-' && a < b ? a : b;
                    const finalAnswer = op === '+' ? finalA + finalB : finalA - finalB;

                    return {
                        id: Math.random().toString(36).substr(2, 9),
                        type: 'adult',
                        numbers: [finalA, finalB],
                        ops: [op],
                        answer: finalAnswer
                    };
                } else {
                    // 세자리 수 3개 혼합 연산
                    const a = Math.floor(Math.random() * 900) + 100;
                    const b = Math.floor(Math.random() * 400) + 100;
                    const c = Math.floor(Math.random() * 400) + 100;
                    const op1 = Math.random() > 0.5 ? '+' : '-';
                    const op2 = Math.random() > 0.5 ? '+' : '-';

                    let finalA = a;
                    let finalB = b;
                    if (op1 === '-' && a < b) {
                        finalA = b + 150;
                    }
                    let temp = op1 === '+' ? finalA + finalB : finalA - finalB;

                    let finalC = c;
                    if (op2 === '-' && temp < c) {
                        finalC = Math.floor(temp / 2) + 1;
                    }
                    const answer = op2 === '+' ? temp + finalC : temp - finalC;

                    return {
                        id: Math.random().toString(36).substr(2, 9),
                        type: 'adult_3',
                        numbers: [finalA, finalB, finalC],
                        ops: [op1, op2],
                        answer: answer
                    };
                }
            }

            // [신규] 레벨 40 이상 고난이도 문제 출제 분기
            if (currentLevel >= 40) {
                const type = Math.floor(Math.random() * 3) + 1; // 1: 두자리 덧셈, 2: 두자리 뺄셈, 3: 구구단
                if (type === 1) {
                    // 받아올림이 있는 두자리 수 + 두자리 수
                    let a, b;
                    do {
                        a = Math.floor(Math.random() * 80) + 10; // 10 ~ 89
                        b = Math.floor(Math.random() * 80) + 10; // 10 ~ 89
                    } while ((a % 10) + (b % 10) < 10); // 일의 자리 합이 10 이상이어야 받아올림 보장

                    return {
                        id: Math.random().toString(36).substr(2, 9),
                        type: 'level40_add',
                        numbers: [a, b],
                        ops: ['+'],
                        answer: a + b
                    };
                } else if (type === 2) {
                    // 받아내림이 있는 두자리 수 - 두자리 수
                    let a, b;
                    do {
                        a = Math.floor(Math.random() * 80) + 19; // 19 ~ 98
                        b = Math.floor(Math.random() * 80) + 10; // 10 ~ 89
                    } while (a <= b || (a % 10) >= (b % 10)); // a > b 여야 하고, 일의 자리 a < b 여야 받아내림 보장

                    return {
                        id: Math.random().toString(36).substr(2, 9),
                        type: 'level40_sub',
                        numbers: [a, b],
                        ops: ['-'],
                        answer: a - b
                    };
                } else {
                    // 구구단 (한자리 수 곱셈)
                    const a = Math.floor(Math.random() * 8) + 2; // 2 ~ 9
                    const b = Math.floor(Math.random() * 9) + 1; // 1 ~ 9
                    return {
                        id: Math.random().toString(36).substr(2, 9),
                        type: 'level40_mul',
                        numbers: [a, b],
                        ops: ['×'],
                        answer: a * b
                    };
                }
            }

            const type = Math.floor(Math.random() * 3) + 1;

            if (type === 1) {
                // 1. 받아내림이 있는 두자리 숫자 뺄셈
                let a, b;
                do {
                    a = Math.floor(Math.random() * 70) + 20; // 20 ~ 89
                    b = Math.floor(Math.random() * 8) + 2;   // 2 ~ 9
                } while (a % 10 >= b); // 일의 자리 숫자가 빼는 수보다 작아야 받아내림 발생

                return {
                    id: Math.random().toString(36).substr(2, 9),
                    type: 1,
                    numbers: [a, b],
                    ops: ['-'],
                    answer: a - b
                };
            } else if (type === 2) {
                // 2. 받아올림이 있는 두자리 + 한자리 숫자 덧셈
                let a, b;
                do {
                    a = Math.floor(Math.random() * 70) + 11; // 11 ~ 80
                    b = Math.floor(Math.random() * 8) + 2;   // 2 ~ 9
                } while ((a % 10) + b < 10); // 일의 자리 합이 10 이상이어야 받아올림 발생

                return {
                    id: Math.random().toString(36).substr(2, 9),
                    type: 2,
                    numbers: [a, b],
                    ops: ['+'],
                    answer: a + b
                };
            } else {
                // 3. 세 수의 연산 (덧셈/뺄셈 섞임)
                let a, b, c, op1, op2, ans;
                do {
                    a = Math.floor(Math.random() * 11) + 10; // 10 ~ 20
                    b = Math.floor(Math.random() * 9) + 1;   // 1 ~ 9
                    c = Math.floor(Math.random() * 9) + 1;   // 1 ~ 9
                    op1 = Math.random() > 0.5 ? '+' : '-';
                    op2 = Math.random() > 0.5 ? '+' : '-';

                    let temp = op1 === '+' ? a + b : a - b;
                    ans = op2 === '+' ? temp + c : temp - c;
                } while ((op1 === '-' && a - b < 0) || ans < 0 || ans > 40); // 중간 계산과 결과가 음수가 되지 않도록 설정

                return {
                    id: Math.random().toString(36).substr(2, 9),
                    type: 3,
                    numbers: [a, b, c],
                    ops: [op1, op2],
                    answer: ans
                };
            }
        };

        // 레벨에 따른 레이서 및 자동차 SVG 컴포넌트
        const RacerAvatar = ({ level }) => {
            const visualLevel = Math.min(level, 4); // 외형은 4단계까지만

            // 1단계: 초보 꼬마 레이서
            if (visualLevel === 1) {
                return (
                    <svg viewBox="0 0 100 100" className="w-24 h-24 sm:w-32 sm:h-32 drop-shadow-md">
                        {/* Body */}
                        <rect x="35" y="50" width="30" height="40" rx="5" fill="#fcd34d" />
                        <rect x="35" y="50" width="30" height="40" rx="5" fill="#f59e0b" clipPath="inset(50% 0 0 0)" />
                        {/* Head */}
                        <circle cx="50" cy="35" r="20" fill="#fde047" />
                        {/* Cap */}
                        <path d="M 25 25 Q 50 10 75 25 L 85 25 L 85 30 L 25 30 Z" fill="#ef4444" />
                        {/* Face */}
                        <circle cx="43" cy="35" r="2" fill="#1e293b" />
                        <circle cx="57" cy="35" r="2" fill="#1e293b" />
                        <path d="M 45 42 Q 50 47 55 42" stroke="#1e293b" strokeWidth="2" fill="none" />
                    </svg>
                );
            }
            // 2단계: 아마추어 레이서 (기본 헬멧)
            if (visualLevel === 2) {
                return (
                    <svg viewBox="0 0 100 100" className="w-24 h-24 sm:w-32 sm:h-32 drop-shadow-lg">
                        {/* Body */}
                        <path d="M30 90 L35 50 L65 50 L70 90 Z" fill="#ef4444" />
                        <path d="M45 50 L55 50 L55 90 L45 90 Z" fill="#ffffff" /> {/* Stripe */}
                        {/* Helmet */}
                        <circle cx="50" cy="35" r="22" fill="#e2e8f0" />
                        <rect x="35" y="25" width="30" height="15" rx="5" fill="#1e293b" /> {/* Visor */}
                        <circle cx="50" cy="35" r="22" fill="none" stroke="#ef4444" strokeWidth="3" />
                    </svg>
                );
            }
            // 3단계: 프로 레이서 (풀페이스 헬멧 & 멋진 슈트)
            if (visualLevel === 3) {
                return (
                    <svg viewBox="0 0 100 100" className="w-24 h-24 sm:w-32 sm:h-32 drop-shadow-xl">
                        {/* Body */}
                        <path d="M25 90 C30 60 30 50 35 45 L65 45 C70 50 70 60 75 90 Z" fill="#1d4ed8" />
                        <path d="M35 45 L45 90 L55 90 L65 45 Z" fill="#fbbf24" />
                        {/* Helmet */}
                        <circle cx="50" cy="35" r="24" fill="#1e3a8a" />
                        <path d="M 30 35 C 30 20 70 20 70 35 L 65 45 L 35 45 Z" fill="#fbbf24" />
                        <rect x="35" y="28" width="30" height="12" rx="4" fill="#0f172a" /> {/* Shiny Visor */}
                        <rect x="38" y="30" width="8" height="3" rx="1" fill="#cbd5e1" opacity="0.6" /> {/* Reflection */}
                    </svg>
                );
            }
            // 4단계: 레전드 레이서 (사이버펑크 네온)
            return (
                <svg viewBox="0 0 100 100" className="w-24 h-24 sm:w-32 sm:h-32 drop-shadow-2xl">
                    {/* Glow Effect */}
                    <circle cx="50" cy="50" r="45" fill="#0ea5e9" opacity="0.2" filter="blur(10px)" />
                    {/* Body */}
                    <path d="M25 90 L35 45 L65 45 L75 90 Z" fill="#0f172a" stroke="#0ea5e9" strokeWidth="2" />
                    <path d="M40 45 L50 70 L60 45 Z" fill="#0ea5e9" opacity="0.8" />
                    {/* Helmet */}
                    <path d="M25 35 C25 15 75 15 75 35 L70 50 L30 50 Z" fill="#0f172a" stroke="#0ea5e9" strokeWidth="2" />
                    <path d="M30 35 C30 25 70 25 70 35 L65 45 L35 45 Z" fill="#38bdf8" opacity="0.9" /> {/* Neon Visor */}
                    <rect x="35" y="30" width="30" height="5" fill="#f0f9ff" opacity="0.8" />
                </svg>
            );
        };

        const CarAvatar = ({ activeCar, onClick }) => {
            const car = CAR_DATA[activeCar] || CAR_DATA.lv1;
            return (
                <div
                    onClick={onClick}
                    className="relative w-48 sm:w-64 animate-float drop-shadow-2xl group flex flex-col items-center cursor-pointer"
                >
                    <div className="relative overflow-hidden rounded-2xl border-4 border-slate-700 shadow-xl bg-slate-900 w-full h-32 sm:h-40 animate-pulse hover:animate-none">
                        <img
                            src={car.image}
                            alt={car.name}
                            className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
                        />
                        <div className="absolute inset-0 bg-gradient-to-t from-slate-950 via-transparent to-transparent opacity-60"></div>
                        <div className="absolute bottom-2 left-3 right-3 text-left flex justify-between items-center w-[90%]">
                            <span className="text-sm font-bold text-yellow-400 drop-shadow-md">{car.name}</span>
                            <span className="text-[10px] text-indigo-300 bg-indigo-950/80 px-2 py-0.5 rounded-full border border-indigo-500/30">🔍 크게 보기</span>
                        </div>
                    </div>
                </div>
            );
        };

        const MathProblem = ({ problem, onSolve }) => {
            const [inputValue, setInputValue] = useState('');
            const [isSolved, setIsSolved] = useState(false);
            const inputRef = useRef(null);

            useEffect(() => {
                // 새로운 문제 뱃치가 오면 초기화
                setInputValue('');
                setIsSolved(false);
            }, [problem.id]);

            const handleChange = (e) => {
                if (isSolved) return; // 이미 풀었으면 입력 방지

                const val = e.target.value;
                setInputValue(val);

                if (parseInt(val) === problem.answer) {
                    setIsSolved(true);
                    onSolve();

                    // 정답 시 축하 효과
                    const rect = inputRef.current.getBoundingClientRect();
                    const x = (rect.left + rect.width / 2) / window.innerWidth;
                    const y = (rect.top + rect.height / 2) / window.innerHeight;

                    confetti({
                        particleCount: 50,
                        spread: 60,
                        origin: { x, y },
                        colors: ['#22c55e', '#fbbf24', '#3b82f6', '#ef4444']
                    });
                }
            };

            return (
                <div className={`problem-card bg-white p-6 rounded-2xl flex flex-col items-end w-48 sm:w-56 ${isSolved ? 'solved' : ''}`}>
                    <div className="text-4xl font-bold tracking-widest flex flex-col items-end space-y-2 text-slate-700 w-full pr-2">
                        {problem.type === 'toddler' ? (
                            <div className="flex flex-col items-center justify-center w-full py-2 text-center">
                                <span className="text-xs text-indigo-500 mb-3 font-extrabold tracking-normal">과일이 모두 몇 개일까요? 🍒</span>
                                <div className="flex flex-wrap items-center justify-center gap-2 py-4 px-4 bg-slate-50 border border-slate-100 rounded-2xl w-full select-none shadow-inner min-h-[70px]">
                                    {Array.from({ length: problem.fruitCount || problem.answer }).map((_, i) => (
                                        <span 
                                            key={i} 
                                            className="text-4xl animate-bounce" 
                                            style={{ 
                                                animationDelay: `${i * 0.15}s`, 
                                                animationDuration: '1.2s',
                                                display: 'inline-block'
                                            }}
                                        >
                                            {problem.fruit || '🍎'}
                                        </span>
                                    ))}
                                </div>
                            </div>
                        ) : problem.numbers.length === 2 ? (
                            <>
                                <div>{problem.numbers[0]}</div>
                                <div className="flex w-full justify-between">
                                    <span className="text-red-500">{problem.ops[0]}</span>
                                    <span>{problem.numbers[1]}</span>
                                </div>
                            </>
                        ) : (
                            <>
                                <div>{problem.numbers[0]}</div>
                                <div className="flex w-full justify-between">
                                    <span className="text-red-500">{problem.ops[0]}</span>
                                    <span>{problem.numbers[1]}</span>
                                </div>
                                <div className="flex w-full justify-between">
                                    <span className="text-blue-500">{problem.ops[1]}</span>
                                    <span>{problem.numbers[2]}</span>
                                </div>
                            </>
                        )}
                    </div>
                    <hr className="w-full border-slate-800 border-2 my-3 rounded-full" />
                    <input
                        ref={inputRef}
                        type="number"
                        value={inputValue}
                        onChange={handleChange}
                        disabled={isSolved}
                        className={`input-box w-24 h-12 text-3xl font-bold text-right px-2 border-4 rounded-xl focus:outline-none transition-colors
                            ${isSolved ? 'bg-transparent border-green-500 text-green-700' : 'bg-slate-100 border-slate-300 focus:border-blue-400 focus:bg-white text-slate-800'}`}
                        placeholder="?"
                    />
                </div>
            );
        };

        const LoginScreen = ({ onLoginSuccess }) => {
            const [id, setId] = useState('');
            const [password, setPassword] = useState('');
            const [isRegistering, setIsRegistering] = useState(false);
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                if (!id.trim() || !password.trim()) {
                    setError('아이디와 비밀번호를 모두 입력해주세요.');
                    return;
                }
                setLoading(true);
                try {
                    if (isRegistering) {
                        const userData = await dbService.register(id, password);
                        onLoginSuccess(userData);
                    } else {
                        const userData = await dbService.login(id, password);
                        onLoginSuccess(userData);
                    }
                } catch (err) {
                    setError(err.message || '요청 처리 중 에러가 발생했습니다.');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-4 relative overflow-hidden font-jua">
                    {/* Background Deco */}
                    <div className="absolute top-0 left-0 w-full h-full opacity-5 pointer-events-none"
                        style={{ backgroundImage: 'radial-gradient(#ffffff 2px, transparent 2px)', backgroundSize: '20px 20px' }}></div>

                    {/* Login Card */}
                    <div className="bg-slate-800/80 border-2 border-indigo-500/40 rounded-3xl p-6 sm:p-8 max-w-md w-full shadow-2xl backdrop-blur-md relative z-10 animate-fadeIn text-white text-center">
                        <div className="text-6xl mb-3 animate-bounce">🏁</div>
                        <h1 className="text-3xl font-extrabold text-indigo-400 drop-shadow-sm mb-1 tracking-wide">레이서 키우기</h1>
                        <p className="text-slate-400 text-xs sm:text-sm mb-6">산수 배틀을 승리하여 나만의 드림카를 튜닝하세요!</p>

                        <form onSubmit={handleSubmit} className="space-y-4 text-left">
                            <div>
                                <label className="block text-slate-300 text-xs font-bold mb-1.5 pl-1">👤 플레이어 ID</label>
                                <input
                                    type="text"
                                    value={id}
                                    onChange={(e) => setId(e.target.value)}
                                    placeholder="영문, 숫자 아이디 입력"
                                    className="w-full bg-slate-950/60 border border-slate-700/80 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500 transition-colors font-sans text-sm"
                                    disabled={loading}
                                />
                            </div>
                            <div>
                                <label className="block text-slate-300 text-xs font-bold mb-1.5 pl-1">🔑 비밀번호</label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    placeholder="비밀번호 입력"
                                    className="w-full bg-slate-950/60 border border-slate-700/80 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500 transition-colors font-sans text-sm"
                                    disabled={loading}
                                />
                            </div>

                            {error && (
                                <div className="bg-red-500/10 border border-red-500/50 rounded-xl p-3 text-red-400 text-xs font-bold animate-pulse text-center">
                                    ⚠️ {error}
                                </div>
                            )}

                            <div className="pt-2 flex flex-col gap-2">
                                <button
                                    type="submit"
                                    disabled={loading}
                                    className="w-full bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-400 hover:to-purple-500 text-white font-bold py-3 rounded-xl transition-all shadow-lg text-sm sm:text-base active:scale-95 flex items-center justify-center gap-1.5 disabled:opacity-50"
                                >
                                    {loading ? (
                                        <span>처리 중...</span>
                                    ) : (
                                        <>
                                            <span>{isRegistering ? '회원가입 완료 및 출발' : '로그인 및 서킷 입장'}</span>
                                            <span>🚀</span>
                                        </>
                                    )}
                                </button>

                                <button
                                    type="button"
                                    onClick={() => {
                                        setIsRegistering(!isRegistering);
                                        setError('');
                                    }}
                                    className="w-full text-center text-xs text-slate-400 hover:text-indigo-400 py-1.5 transition-colors font-bold"
                                    disabled={loading}
                                >
                                    {isRegistering ? '이미 아이디가 있으신가요? 로그인하기' : '처음 오셨나요? 새로운 플레이어 등록하기'}
                                </button>
                            </div>
                        </form>

                        <div className="mt-6 pt-4 border-t border-slate-700/50 flex flex-col items-center gap-1.5">
                            {dbService.isFirebase ? (
                                <div className="flex items-center gap-1.5 text-xs text-green-400 font-bold bg-green-500/10 px-3 py-1.5 rounded-full border border-green-500/30">
                                    <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                                    <span>실시간 클라우드 동기화 모드 작동 중</span>
                                </div>
                            ) : (
                                <div className="flex flex-col items-center gap-1 text-center">
                                    <div className="flex items-center gap-1.5 text-xs text-amber-400 font-bold bg-amber-500/10 px-3 py-1.5 rounded-full border border-amber-500/30">
                                        <span className="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
                                        <span>로컬 체험 모드 실행 중</span>
                                    </div>
                                    <p className="text-[10px] text-slate-400 max-w-[280px] leading-normal break-keep">
                                        💡 index.html의 <b>firebaseConfig</b> 객체에 연결 값을 넣으면 원격 실시간 서버로 연동됩니다!
                                    </p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [currentUser, setCurrentUser] = useState(null);

            const [level, setLevel] = useState(1);
            const [problems, setProblems] = useState([]);
            const [solvedCount, setSolvedCount] = useState(0); // 현재 라운드에서 푼 문제 수
            const [totalExp, setTotalExp] = useState(0); // 총 경험치
            const [showNextStage, setShowNextStage] = useState(false);

            // 신규 상태: 부품, 업그레이드 포인트
            const [parts, setParts] = useState({ engine: 0, mission: 0, tire: 0, brake: 0 });
            const [upgradePoints, setUpgradePoints] = useState(0);

            // 신차 관련 상태
            const [ownedCars, setOwnedCars] = useState(['lv1']);
            const [activeCar, setActiveCar] = useState('lv1');
            const [hasSelectedInitialCar, setHasSelectedInitialCar] = useState(false);
            const [hasSeenLv2Popup, setHasSeenLv2Popup] = useState(false);

            // 모달 상태
            const [showCarSelectionModal, setShowCarSelectionModal] = useState(false);
            const [showIntroPopup, setShowIntroPopup] = useState(false);
            const [showShopModal, setShowShopModal] = useState(false);

            // 초기화 비밀번호 모달 상태
            const [showResetModal, setShowResetModal] = useState(false);
            const [resetPasswordInput, setResetPasswordInput] = useState('');
            const [resetError, setResetError] = useState('');

            // 랭킹보드 모달 상태
            const [showRankingModal, setShowRankingModal] = useState(false);
            const [rankingTab, setRankingTab] = useState('level'); // 'level' or 'speed'
            const [rankingData, setRankingData] = useState([]);
            const [rankingLoading, setRankingLoading] = useState(false);

            // [신규] 자동차 이미지 확대 제어 상태
            const [showImageModal, setShowImageModal] = useState(false);
            const [selectedImageUrl, setSelectedImageUrl] = useState("");
            const [selectedImageName, setSelectedImageName] = useState("");

            // [신규] 일일 가상 대결 및 배틀 상태들 (상대 ID별 맵 고도화)
            const [lastMatchMap, setLastMatchMap] = useState({}); // { opponentId: YYYY-MM-DD }
            const [showBattleModal, setShowBattleModal] = useState(false);
            const [battleOpponent, setBattleOpponent] = useState(null);
            const [battleState, setBattleState] = useState('ready'); // 'ready' | 'racing' | 'finished'
            const [playerDistance, setPlayerDistance] = useState(0);
            const [opponentDistance, setOpponentDistance] = useState(0);
            const [playerSpeed, setPlayerSpeed] = useState(0);
            const [opponentSpeed, setOpponentSpeed] = useState(0);
            const [battleTime, setBattleTime] = useState(0);
            const [battleWinner, setBattleWinner] = useState(null); // 'player' | 'opponent'

            const [levelClickCount, setLevelClickCount] = useState(0);
            const [isEditingLevel, setIsEditingLevel] = useState(false);
            const [editLevelValue, setEditLevelValue] = useState("");
            const clickTimeout = useRef(null);

            // 자동 로그인 세션 복구 및 초기화
            useEffect(() => {
                const savedUser = localStorage.getItem('racer-current-user');
                if (savedUser) {
                    restoreUserSession(savedUser);
                }
            }, []);

            const restoreUserSession = async (userId) => {
                try {
                    let userData = null;
                    if (dbService.isFirebase) {
                        const doc = await dbService.firestore.collection('racer_users').doc(userId).get();
                        if (doc.exists) {
                            userData = doc.data();
                        }
                    } else {
                        const users = dbService._getLocalUsers();
                        userData = users[userId];
                    }

                    if (userData) {
                        setCurrentUser(userId);
                        setLevel(userData.level || 1);
                        setTotalExp(userData.totalExp || 0);
                        setParts(userData.parts || { engine: 0, mission: 0, tire: 0, brake: 0 });
                        setUpgradePoints(userData.upgradePoints || 0);
                        setOwnedCars(userData.ownedCars || ['lv1']);
                        setActiveCar(userData.activeCar || 'lv1');
                        setHasSelectedInitialCar(userData.hasSelectedInitialCar || false);
                        setHasSeenLv2Popup(userData.hasSeenLv2Popup || false);

                        // 구버전 및 단일 데이터 형식에 대한 유연한 하이브리드 복원 안전망
                        let matchMap = {};
                        if (userData.lastMatchMap) {
                            matchMap = typeof userData.lastMatchMap === 'string' ? {} : userData.lastMatchMap;
                        }
                        setLastMatchMap(matchMap);
                    }
                } catch (error) {
                    console.error("세션 복구 에러:", error);
                }
            };

            // 로그인 성공 핸들러
            const handleLoginSuccess = (userData) => {
                localStorage.setItem('racer-current-user', userData.id);
                setCurrentUser(userData.id);

                // 유저 진행 데이터 바인딩
                setLevel(userData.level || 1);
                setTotalExp(userData.totalExp || 0);
                setParts(userData.parts || { engine: 0, mission: 0, tire: 0, brake: 0 });
                setUpgradePoints(userData.upgradePoints || 0);
                setOwnedCars(userData.ownedCars || ['lv1']);
                setActiveCar(userData.activeCar || 'lv1');
                setHasSelectedInitialCar(userData.hasSelectedInitialCar || false);
                setHasSeenLv2Popup(userData.hasSeenLv2Popup || false);

                let matchMap = {};
                if (userData.lastMatchMap) {
                    matchMap = typeof userData.lastMatchMap === 'string' ? {} : userData.lastMatchMap;
                }
                setLastMatchMap(matchMap);
            };

            // 로그아웃 핸들러
            const handleLogout = () => {
                localStorage.removeItem('racer-current-user');
                setCurrentUser(null);
                // 모든 상태 기본값으로 환원
                setLevel(1);
                setTotalExp(0);
                setParts({ engine: 0, mission: 0, tire: 0, brake: 0 });
                setUpgradePoints(0);
                setOwnedCars(['lv1']);
                setActiveCar('lv1');
                setHasSelectedInitialCar(false);
                setHasSeenLv2Popup(false);
                setLastMatchMap({}); // 대결 기록 초기화
            };

            // 랭킹 열기 핸들러
            const handleOpenRanking = async () => {
                setShowRankingModal(true);
                setRankingLoading(true);
                try {
                    const rawList = await dbService.fetchRankings();
                    setRankingData(rawList);
                } catch (error) {
                    console.error("랭킹 수집 실패:", error);
                } finally {
                    setRankingLoading(false);
                }
            };

            // 클라우드/모의 DB 세이브 헬퍼 함수
            const saveProgress = (newLevel, newExp, newParts, newPoints, newOwned = ownedCars, newActive = activeCar, newSelected = hasSelectedInitialCar, newSeen = hasSeenLv2Popup, newLastMatchMap = lastMatchMap) => {
                const userId = currentUser || localStorage.getItem('racer-current-user');
                if (!userId) return;
                try {
                    const speed = getSpeedVal(newActive, newParts);
                    const accel = getAccelVal(newActive, newParts);
                    const handling = getHandlingVal(newActive, newParts);
                    const carName = CAR_DATA[newActive]?.name || '';
                    const dataToSave = {
                        level: newLevel,
                        totalExp: newExp,
                        parts: newParts,
                        upgradePoints: newPoints,
                        ownedCars: newOwned,
                        activeCar: newActive,
                        hasSelectedInitialCar: newSelected,
                        hasSeenLv2Popup: newSeen,
                        maxSpeed: speed,
                        maxAccel: accel,
                        maxHandling: handling,
                        activeCarName: carName,
                        lastMatchMap: newLastMatchMap
                    };
                    dbService.saveProgress(userId, dataToSave);
                } catch (error) {
                    console.error("진행상황 저장 에러:", error);
                }
            };

            // [신규] 배틀 틱 제어용 Refs
            const battleFrameId = useRef(null);
            const battleLastTime = useRef(0);
            const battleSimTime = useRef(0);

            // 배틀 시작 핸들러
            const handleStartBattle = (opponent) => {
                const todayStr = new Date().toISOString().split('T')[0];
                if (lastMatchMap && lastMatchMap[opponent.id] === todayStr) {
                    alert(`⚠️ ${opponent.id} 플레이어와는 오늘의 배틀을 이미 마쳤습니다! 다른 상대와 경쟁하거나 내일 도전하세요!`);
                    return;
                }

                // 스펙 추출
                const pSpeed = calculateSpeed();
                const pAccel = calculateAccel();
                const oppSpeed = opponent.maxSpeed || 200;

                // 상대방 가속도 산출을 위한 안전 fallback 포함 연산
                const oppAccel = getAccelVal(
                    opponent.activeCar || 'lv1',
                    opponent.parts || { engine: 0, mission: 0, tire: 0, brake: 0 }
                );

                setBattleOpponent(opponent);
                setBattleState('ready');
                setPlayerDistance(0);
                setOpponentDistance(0);
                setPlayerSpeed(0);
                setOpponentSpeed(0);
                setBattleTime(0);
                setBattleWinner(null);
                setShowBattleModal(true);
                setShowRankingModal(false);
            };

            // 물리 기반 완주 시간 계산 (초)
            const calcPhysicsTime = (maxSpeed, accel) => {
                const v = maxSpeed / 3.6; // m/s
                const a = accel; // m/s^2
                const t_acc = v / a;
                const d_acc = 0.5 * a * t_acc * t_acc;
                if (d_acc >= 10000) {
                    return Math.sqrt(20000 / a);
                } else {
                    const d_cruise = 10000 - d_acc;
                    const t_cruise = d_cruise / v;
                    return t_acc + t_cruise;
                }
            };

            // 가상 경과 시간에 따른 실시간 주행거리 계산 (m)
            const getDistAtTime = (maxSpeed, accel, t) => {
                const v_max = maxSpeed / 3.6;
                const a = accel;
                const t_acc = v_max / a;
                const d_acc = 0.5 * a * t_acc * t_acc;

                if (t <= t_acc) {
                    const curDist = 0.5 * a * t * t;
                    return Math.min(10000, curDist);
                } else {
                    const curDist = d_acc + v_max * (t - t_acc);
                    return Math.min(10000, curDist);
                }
            };

            // 가상 경과 시간에 따른 실시간 시속 계산 (km/h)
            const getSpeedAtTime = (maxSpeed, accel, t) => {
                const v_max = maxSpeed / 3.6;
                const a = accel;
                const t_acc = v_max / a;
                if (t <= t_acc) {
                    return Math.min(maxSpeed, (a * t) * 3.6);
                } else {
                    return maxSpeed;
                }
            };

            // 스타디움 배틀 엔진 구동 (10초 타임랩스 가동)
            const handleLaunchBattle = () => {
                if (battleState !== 'ready') return;
                setBattleState('racing');

                const pSpeed = calculateSpeed();
                const pAccel = calculateAccel();
                const oppSpeed = battleOpponent.maxSpeed || 200;
                const oppAccel = getAccelVal(
                    battleOpponent.activeCar || 'lv1',
                    battleOpponent.parts || { engine: 0, mission: 0, tire: 0, brake: 0 }
                );

                // 각 차량 실제 완주 타임
                const tPlayer = calcPhysicsTime(pSpeed, pAccel);
                const tOpponent = calcPhysicsTime(oppSpeed, oppAccel);
                const maxRealTime = Math.max(tPlayer, tOpponent);

                // 10초 완주 타겟을 위한 타임랩스 배속율 계산
                const TARGET_DURATION = 10; // 10초 동안 질주
                const multiplier = maxRealTime / TARGET_DURATION;

                battleSimTime.current = 0;
                battleLastTime.current = performance.now();

                const loop = (now) => {
                    const dt = (now - battleLastTime.current) / 1000; // 초 단위 델타 타임
                    battleLastTime.current = now;

                    // dt가 너무 길 경우(탭 백그라운드 등) 보정
                    const cappedDt = Math.min(dt, 0.1);

                    // 타임랩스 배속율 반영하여 가상 시뮬레이션 시간 누적
                    battleSimTime.current += cappedDt * multiplier;
                    const simT = battleSimTime.current;

                    const curPlayerDist = getDistAtTime(pSpeed, pAccel, simT);
                    const curOpponentDist = getDistAtTime(oppSpeed, oppAccel, simT);

                    setPlayerDistance(curPlayerDist);
                    setOpponentDistance(curOpponentDist);
                    setPlayerSpeed(getSpeedAtTime(pSpeed, pAccel, simT));
                    setOpponentSpeed(getSpeedAtTime(oppSpeed, oppAccel, simT));
                    setBattleTime(simT);

                    if (curPlayerDist >= 10000 || curOpponentDist >= 10000) {
                        // 피니시 완료!
                        setBattleState('finished');
                        const isWin = tPlayer < tOpponent;
                        const winner = isWin ? 'player' : 'opponent';
                        setBattleWinner(winner);

                        // 보상 및 잠금 데이터 업데이트
                        const todayStr = new Date().toISOString().split('T')[0];
                        const nextMatchMap = {
                            ...lastMatchMap,
                            [battleOpponent.id]: todayStr
                        };
                        setLastMatchMap(nextMatchMap);

                        let nextPoints = upgradePoints;
                        if (isWin) {
                            nextPoints = upgradePoints + 1;
                            setUpgradePoints(nextPoints);
                        }

                        // 저장 동기화
                        saveProgress(level, totalExp, parts, nextPoints, ownedCars, activeCar, hasSelectedInitialCar, hasSeenLv2Popup, nextMatchMap);

                        if (isWin) {
                            // 대축하 confetti 분사
                            confetti({
                                particleCount: 100,
                                spread: 80,
                                origin: { y: 0.6 }
                            });
                        }
                    } else {
                        battleFrameId.current = requestAnimationFrame(loop);
                    }
                };

                battleFrameId.current = requestAnimationFrame(loop);
            };

            // 배틀 클린업
            useEffect(() => {
                return () => {
                    if (battleFrameId.current) {
                        cancelAnimationFrame(battleFrameId.current);
                    }
                };
            }, []);

            const handleCloseBattle = () => {
                if (battleFrameId.current) {
                    cancelAnimationFrame(battleFrameId.current);
                    battleFrameId.current = null;
                }
                setShowBattleModal(false);
            };

            const levelEditJustOpened = useRef(false);

            const handleLevelTitleClick = () => {
                if (clickTimeout.current) clearTimeout(clickTimeout.current);

                const newCount = levelClickCount + 1;
                if (newCount >= 5) {
                    const passwordInput = prompt("비밀번호를 입력해야 사용이 가능합니다.\n비밀번호를 입력해주세요:");
                    if (passwordInput === '2569') {
                        levelEditJustOpened.current = true;
                        setEditLevelValue(level.toString());
                        setIsEditingLevel(true);
                    } else if (passwordInput !== null) {
                        alert("비밀번호가 올바르지 않습니다!");
                    }
                    setLevelClickCount(0);
                } else {
                    setLevelClickCount(newCount);
                    // 1초 안에 다시 누르지 않으면 카운트 초기화
                    clickTimeout.current = setTimeout(() => {
                        setLevelClickCount(0);
                    }, 1000);
                }
            };

            const handleLevelEditComplete = (e) => {
                // blur 이벤트가 편집 직후에 발생하면 무시 (prompt 다이얼로그 포커스 복귀 문제 방지)
                if (e.type === 'blur' && levelEditJustOpened.current) {
                    levelEditJustOpened.current = false;
                    return;
                }
                if (e.key === 'Enter' || e.type === 'blur') {
                    const newLevel = parseInt(editLevelValue, 10);
                    if (!isNaN(newLevel) && newLevel > 0) {
                        const prevLevel = level;
                        setLevel(newLevel);

                        // 레벨 1 오를 때마다 1점 보상
                        let newPoints = upgradePoints;
                        if (newLevel > prevLevel) {
                            newPoints += (newLevel - prevLevel);
                        }

                        let newSelected = hasSelectedInitialCar;
                        let newSeen = hasSeenLv2Popup;

                        if (newLevel >= 2) {
                            if (!hasSelectedInitialCar) {
                                setShowCarSelectionModal(true);
                            }
                            if (!hasSeenLv2Popup) {
                                setShowIntroPopup(true);
                            }
                        }

                        setUpgradePoints(newPoints);
                        saveProgress(newLevel, totalExp, parts, newPoints, ownedCars, activeCar, newSelected, newSeen);
                    }
                    setIsEditingLevel(false);
                }
            };

            const generateBatch = () => {
                const isToddler = currentUser && currentUser.toLowerCase() === 'sea';
                const isAdult = currentUser && currentUser.toLowerCase() === 'ooks12';
                const newProbs = Array.from({ length: 5 }, () => generateProblem(isToddler, isAdult, level));
                setProblems(newProbs);
                setSolvedCount(0);
                setShowNextStage(false);
            };

            // 로그인 상태(currentUser)가 변경되거나 세션 복구 완료 시 해당 계정의 맞춤 문제 세트를 생성
            useEffect(() => {
                if (currentUser) {
                    generateBatch();
                }
            }, [currentUser]);

            const handleProblemSolved = () => {
                setSolvedCount(prev => {
                    const newCount = prev + 1;
                    if (newCount === 5) {
                        // 5문제 모두 해결 시 레벨업/경험치 처리
                        setTimeout(() => {
                            completeStage();
                        }, 500);
                    }
                    return newCount;
                });
            };

            const completeStage = () => {
                // 스테이지 클리어 대형 축하 파티클
                const duration = 2000;
                const end = Date.now() + duration;

                (function frame() {
                    confetti({
                        particleCount: 5,
                        angle: 60,
                        spread: 55,
                        origin: { x: 0 },
                        colors: ['#22c55e', '#fbbf24']
                    });
                    confetti({
                        particleCount: 5,
                        angle: 120,
                        spread: 55,
                        origin: { x: 1 },
                        colors: ['#3b82f6', '#ef4444']
                    });

                    if (Date.now() < end) {
                        requestAnimationFrame(frame);
                    }
                }());

                setTotalExp(prev => {
                    const nextExp = prev + 1;
                    setLevel(prevLevel => {
                        const nextLevel = prevLevel + 1;

                        let newSelected = hasSelectedInitialCar;
                        let newSeen = hasSeenLv2Popup;

                        if (nextLevel >= 2) {
                            if (!hasSelectedInitialCar) {
                                setShowCarSelectionModal(true);
                            }
                            if (!hasSeenLv2Popup) {
                                setShowIntroPopup(true);
                            }
                        }

                        // 레벨 1 올릴때마다 업그레이드 포인트 1씩 지급
                        setUpgradePoints(prevPoints => {
                            const nextPoints = prevPoints + 1;
                            saveProgress(nextLevel, nextExp, parts, nextPoints, ownedCars, activeCar, newSelected, newSeen);
                            return nextPoints;
                        });

                        return nextLevel;
                    });
                    return nextExp;
                });
                setShowNextStage(true);
            };

            // 부품 업그레이드 핸들러
            const handleUpgrade = (partName) => {
                if (upgradePoints > 0) {
                    setParts(prev => {
                        const newParts = { ...prev, [partName]: prev[partName] + 1 };
                        setUpgradePoints(prevPoints => {
                            const newPoints = prevPoints - 1;
                            saveProgress(level, totalExp, newParts, newPoints, ownedCars, activeCar, hasSelectedInitialCar, hasSeenLv2Popup);
                            return newPoints;
                        });
                        return newParts;
                    });
                }
            };

            // 최고 속도 계산
            const calculateSpeed = () => {
                const car = CAR_DATA[activeCar] || CAR_DATA.lv1;
                const base = car.baseSpeed;
                // 각 부품별 기본 증가량
                const partBonus = (parts.engine * 3) + (parts.mission * 2) + (parts.tire * 2) + (parts.brake * 2);
                // 세트(균형) 보너스: 모든 부품 중 가장 낮은 레벨 기준 (균형있게 올리면 속도 대폭 증가)
                const minLevel = Math.min(parts.engine, parts.mission, parts.tire, parts.brake);
                const balanceBonus = minLevel * 15;

                return base + partBonus + balanceBonus;
            };

            // 가속도 계산 (무제한)
            const calculateAccel = () => {
                const car = CAR_DATA[activeCar] || CAR_DATA.lv1;
                const base = car.baseAccel;
                // 부품에 따른 가속 보너스
                const upgradeBonus = (parts.engine * 0.15) + (parts.mission * 0.1) + (parts.tire * 0.1);
                return parseFloat((base + upgradeBonus).toFixed(2));
            };

            // 핸들링 계산 (무제한)
            const calculateHandling = () => {
                return getHandlingVal(activeCar, parts);
            };

            // 게이지 계산 (0 ~ 5)
            const progressPercent = (solvedCount / 5) * 100;

            if (!currentUser) {
                return <LoginScreen onLoginSuccess={handleLoginSuccess} />;
            }

            return (
                <div className="max-w-6xl mx-auto p-4 sm:p-8 flex flex-col lg:flex-row gap-8 items-center lg:items-start min-h-screen">

                    {/* Left: Math Problems Area */}
                    <div className="flex-1 w-full bg-white/50 p-6 rounded-3xl shadow-sm border border-slate-200">
                        <div className="flex justify-between items-center mb-6">
                            <h1 className="text-3xl sm:text-4xl font-bold text-slate-800 drop-shadow-sm">
                                🏁 카레이싱 산수 배틀
                            </h1>
                            <div className="bg-yellow-400 text-yellow-900 px-4 py-2 rounded-full font-bold text-xl shadow-sm">
                                목표: 5문제
                            </div>
                        </div>

                        <div className="flex flex-wrap justify-center gap-6">
                            {problems.map((prob) => (
                                <MathProblem
                                    key={prob.id}
                                    problem={prob}
                                    onSolve={handleProblemSolved}
                                />
                            ))}
                        </div>

                        {showNextStage && (
                            <div className="mt-10 flex flex-col items-center animate-bounce">
                                <p className="text-2xl text-green-600 font-bold mb-4">최고에요! 레벨 업!</p>
                                <button
                                    onClick={generateBatch}
                                    className="bg-blue-500 hover:bg-blue-600 text-white text-2xl font-bold py-4 px-10 rounded-full shadow-lg transform transition hover:scale-105 active:scale-95"
                                >
                                    다음 라운드 출발! 🚀
                                </button>
                            </div>
                        )}
                    </div>

                    {/* Right: Gamification Area (Avatar & Progress) */}
                    <div className="w-full lg:w-1/3 bg-slate-800 rounded-3xl p-6 shadow-2xl text-white flex flex-col items-center relative overflow-hidden">
                        {/* Background Deco */}
                        <div className="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none"
                            style={{ backgroundImage: 'radial-gradient(#ffffff 2px, transparent 2px)', backgroundSize: '20px 20px' }}></div>

                        <div className="z-10 w-full flex flex-col items-center h-full">
                            {/* Account Info and Logout */}
                            <div className="w-full flex justify-between items-center bg-slate-900/60 border border-slate-700/50 rounded-2xl px-4 py-2 mb-3 text-xs font-jua">
                                <div className="flex items-center gap-1.5 font-bold">
                                    <span className="text-[14px]">👤</span>
                                    <span className="text-slate-200 truncate max-w-[90px]">{currentUser} 님</span>
                                </div>
                                <div className="flex gap-1.5">
                                    <button
                                        onClick={handleOpenRanking}
                                        className="bg-yellow-500/20 hover:bg-yellow-500/30 text-yellow-300 hover:text-yellow-200 border border-yellow-500/30 font-bold px-2.5 py-1.5 rounded-xl transition-all active:scale-95 text-[10px] flex items-center gap-0.5"
                                    >
                                        🏆 랭킹
                                    </button>
                                    <button
                                        onClick={handleLogout}
                                        className="bg-red-500/20 hover:bg-red-500/30 text-red-300 hover:text-red-200 border border-red-500/30 font-bold px-2.5 py-1.5 rounded-xl transition-all active:scale-95 text-[10px]"
                                    >
                                        로그아웃 🚪
                                    </button>
                                </div>
                            </div>

                            <div className="bg-slate-700 w-full rounded-2xl p-4 mb-4 text-center border border-slate-600 shadow-inner">
                                {isEditingLevel ? (
                                    <input
                                        type="number"
                                        value={editLevelValue}
                                        onChange={(e) => setEditLevelValue(e.target.value)}
                                        onKeyDown={handleLevelEditComplete}
                                        onBlur={handleLevelEditComplete}
                                        className="text-yellow-400 text-2xl font-bold mb-1 w-24 text-center bg-slate-800 border-b-2 border-yellow-400 outline-none rounded-none"
                                        autoFocus
                                    />
                                ) : (
                                    <h2
                                        className="text-yellow-400 text-2xl font-bold mb-1 cursor-pointer select-none transition-transform active:scale-95"
                                        onClick={handleLevelTitleClick}

                                    >
                                        LEVEL {level}
                                    </h2>
                                )}
                                <p className="text-slate-300">경험치를 모아 차를 업그레이드 하세요!</p>
                            </div>

                            {/* Avatars & Speed */}
                            <div className="flex flex-col items-center space-y-2 justify-end relative w-full mb-4 h-56 pt-8">
                                <div className="absolute top-0 right-0 bg-red-500 text-white px-3 py-1 rounded-full font-bold shadow-lg flex flex-col items-end gap-0.5 z-20 text-[11px] sm:text-xs">
                                    <div className="flex items-center gap-1 font-extrabold text-white">
                                        <span>⚡ 최고속도 {calculateSpeed()}km/h</span>
                                    </div>
                                    <div className="text-[10px] text-yellow-300 font-bold">
                                        🔥 가속도 {calculateAccel()}
                                    </div>
                                    <div className="text-[10px] text-green-300 font-bold">
                                        🎯 핸들링 {calculateHandling()}
                                    </div>
                                </div>
                                <RacerAvatar level={level} />
                                <CarAvatar
                                    activeCar={activeCar}
                                    onClick={() => {
                                        const car = CAR_DATA[activeCar] || CAR_DATA.lv1;
                                        setSelectedImageUrl(car.image);
                                        setSelectedImageName(car.name);
                                        setShowImageModal(true);
                                    }}
                                />
                            </div>

                            {/* Owned Garage UI */}
                            {ownedCars.length > 1 && (
                                <div className="w-full bg-slate-900/50 rounded-xl p-3 mb-4 border border-slate-700/80 shadow-md z-10 text-center">
                                    <h3 className="text-yellow-400 font-bold text-xs mb-2 flex items-center justify-center gap-1">🚗 차고 (차량 선택)</h3>
                                    <div className="flex flex-wrap gap-2.5 justify-center">
                                        {ownedCars.map(carId => {
                                            const car = CAR_DATA[carId];
                                            const isActive = activeCar === carId;
                                            return (
                                                <button
                                                    key={carId}
                                                    onClick={() => {
                                                        setActiveCar(carId);
                                                        saveProgress(level, totalExp, parts, upgradePoints, ownedCars, carId, hasSelectedInitialCar, hasSeenLv2Popup);
                                                    }}
                                                    className={`px-2.5 py-1.5 rounded-xl text-xs font-bold transition-all border flex items-center gap-1.5 select-none ${isActive
                                                            ? 'bg-yellow-400 text-yellow-950 border-yellow-400 shadow-md scale-105'
                                                            : 'bg-slate-800 text-slate-300 border-slate-700 hover:border-slate-500'
                                                        }`}
                                                >
                                                    {car?.image && (
                                                        <div
                                                            className="relative w-5 h-5 rounded-md overflow-hidden border border-slate-600/50 cursor-zoom-in group/thumb"
                                                            onClick={(e) => {
                                                                e.stopPropagation();
                                                                setSelectedImageUrl(car.image);
                                                                setSelectedImageName(car.name);
                                                                setShowImageModal(true);
                                                            }}
                                                            title="사진 크게 보기"
                                                        >
                                                            <img
                                                                src={car.image}
                                                                alt={car.name}
                                                                className="w-full h-full object-cover transition-transform group-hover/thumb:scale-125"
                                                            />
                                                            <div className="absolute inset-0 bg-black/10 group-hover/thumb:bg-transparent transition-colors"></div>
                                                        </div>
                                                    )}
                                                    <span>{car?.name}</span>
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {/* Parts Upgrade Panel (Level 2+) */}
                            {level >= 2 && (
                                <div className="w-full bg-slate-900 rounded-xl p-4 mb-4 border-2 border-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.3)] z-10">
                                    <div className="flex justify-between items-center mb-3">
                                        <h3 className="text-blue-400 font-bold text-lg">🔧 튜닝 샵</h3>
                                        <span className="bg-blue-600 text-white px-3 py-1 rounded-full text-sm font-bold shadow-inner">
                                            포인트: {upgradePoints}
                                        </span>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2 text-sm">
                                        {[
                                            { id: 'engine', name: '엔진', icon: '🚀' },
                                            { id: 'mission', name: '미션', icon: '⚙️' },
                                            { id: 'tire', name: '타이어', icon: '🛞' },
                                            { id: 'brake', name: '브레이크', icon: '🛑' }

                                                    onClick={() => handleUpgrade(part.id)}

                                                    +
                                                </button>
                                            </div>

                                    </p>
                                </div>
                            )}

                                            <span className="text-indigo-400 font-bold text-xs">🏎️ 신차 쇼룸</span>

                                            <span>쇼룸 구경하기</span> <span>🛍️</span>

                                <span>{solvedCount} / 5</span>

                            <button

                                    setResetPasswordInput('');

                            </button>
                        </div>

                                <h3 className="text-2xl font-bold text-yellow-400 mb-4 font-jua">레벨 2 달성 축하합니다!</h3>

                                    포인트로는 부품을 업그레이드 할수있으며,

                                <button
                                    onClick={() => {
                                        setShowIntroPopup(false);
                                        setHasSeenLv2Popup(true);
                                        saveProgress(level, totalExp, parts, upgradePoints, ownedCars, activeCar, hasSelectedInitialCar, true);
                                    }}
                                    className="w-full bg-gradient-to-r from-yellow-400 to-amber-500 hover:from-yellow-300 hover:to-amber-400 text-slate-950 font-bold py-3 px-6 rounded-2xl text-lg shadow-lg transform transition hover:scale-105 font-jua"
                                >
                                    확인했습니다! 🏎️
                                </button>
                            </div>
                        </div>
                    )}

                        <div className="fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center z-50 p-4 animate-fadeIn">

                                                    setOwnedCars(newOwned);
                                                    setActiveCar(carId);
                                                    setHasSelectedInitialCar(true);
                                                    setShowCarSelectionModal(false);
                                                    saveProgress(level, totalExp, parts, upgradePoints, newOwned, carId, true, hasSeenLv2Popup);

                                                        <span className="text-white">{car.baseSpeed} km/h</span>

                                                        <span className="text-white">{car.baseAccel}</span>
                                                    </div>
                                                    <div className="w-full bg-slate-800 h-1 rounded-full overflow-hidden">
                                                        <div className="bg-yellow-400 h-full" style={{ width: `${(car.baseAccel / 15) * 100}%` }}></div>
                                                    </div>
                                                    <div className="flex justify-between font-bold text-[10px] mt-1">

                                                        <span className="text-white">{car.baseHandling}</span>

                                                        <div className="bg-green-500 h-full" style={{ width: `${(car.baseHandling / 15) * 100}%` }}></div>
                                                    </div>
                                                </div>
                                            </div>

                                            const car = CAR_DATA[carId];
                                            const isOwned = ownedCars.includes(carId);
                                            const cost = car.cost || 5;

                                            // 차량별 레벨 요구조건 판별 (CAR_DATA의 reqLevel 동적 참조)
                                            const reqLevel = car.reqLevel || 0;
                                            const isLevelMet = level >= reqLevel;
                                            
                                            // 구매/판매 관련 상태값 연산
                                            const canBuy = !isOwned && upgradePoints >= cost && isLevelMet;
                                            const canSell = isOwned && ownedCars.length > 1; // 내 보유 차량이 2대 이상일 때만 판매 가능

                                             return (
                                                <div 
                                                    key={carId}
                                                    className={`bg-slate-900 border rounded-2xl p-4 flex flex-col items-center shadow-md relative group transition-all ${
                                                        isOwned ? 'border-indigo-500/40 bg-indigo-950/10' : 'border-slate-800'

                                                    {/* 레벨 제한 배지 / 보유 상태 배지 */}

                                                        <span className="absolute top-2 right-2 font-bold text-[9px] px-2 py-0.5 rounded-full border bg-indigo-500/80 text-white border-indigo-400">
                                                            보유 중 🚗
                                                        </span>
                                                    ) : (
                                                        reqLevel > 0 && (
                                                            <span className={`absolute top-2 right-2 font-bold text-[9px] px-2 py-0.5 rounded-full border ${isLevelMet
                                                                    ? 'bg-green-500/80 text-white border-green-400'
                                                                    : 'bg-red-500/90 text-white border-red-400 animate-pulse'
                                                                }`}>
                                                                {isLevelMet ? `Lv.${reqLevel} 해금 완료` : `Lv.${reqLevel} 필요`}

                                                        )
                                                    )}
